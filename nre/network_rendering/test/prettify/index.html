<!DOCTYPE html>
<html lang="en">
	<head>
		
		<title>three.js webgl - raw shader</title>		
		<meta charset="utf-8">		
		<style>
			body { margin: 0; }
		</style>
	</head>
	

	<body>
		<script id="customVertexShader" type="x-shader/x-vertex">

			precision mediump float;
			precision mediump int;

			attribute vec4 color;

			varying vec3 vPosition;
			varying vec4 vColor;

			void main()	{

				vPosition = position;
				vColor = color;

				gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 );

			}

		</script>

		<script id="customFragmentShader" type="x-shader/x-fragment">

			precision mediump float;
			precision mediump int;

			uniform float time;

			varying vec3 vPosition;
			varying vec4 vColor;

			void main()	{

				vec4 color = vec4( vColor );
				color.g = sin( vPosition.x * 10.0 + time ) ;

				gl_FragColor = color;

			}

		</script>		
		
		<script id="vertexShader" type="x-shader/x-vertex" >

			varying vec2 vUv;

			void main() {

				vUv = uv;

				gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 );

			}

		</script>

		<script id="fragmentShader" type="x-shader/x-fragment" >

			uniform sampler2D baseTexture;
			uniform sampler2D bloomTexture;

			varying vec2 vUv;

			void main() {
				// 				 Original Texture 				Intensity  	 *	Bloom Texture 
				gl_FragColor = ( texture2D( baseTexture, vUv ) + vec4( 1.0 ) * texture2D( bloomTexture, vUv ) );

			}

		</script>

		<div id="container"></div>

		<script type="module" src="/nodeTest.js"></script>
		
		</script>

	</body>
</html>
